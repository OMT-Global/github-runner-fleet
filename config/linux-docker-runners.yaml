version: 1
image:
  repository: ghcr.io/OMT-Global/github-runner-fleet
  tag: 0.1.9

pools:
  - key: linux-docker-private
    organization: OMT-Global
    runnerGroup: linux-docker-private
    repositoryAccess: selected
    allowedRepositories:
      - OMT-Global/github-runner-fleet
    labels:
      - x64
    size: 2
    architecture: amd64
    runnerRoot: ${LINUX_DOCKER_RUNNER_BASE_DIR}/pools/linux-docker-private
    resources:
      cpus: "4"
      memory: 8g
