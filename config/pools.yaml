version: 1
image:
  repository: ghcr.io/omt-global/github-runner-fleet
  tag: 0.1.9
pools:
  - key: synology-private
    visibility: private
    organization: omt-global
    runnerGroup: synology-private
    repositoryAccess: all
    labels:
      - synology
      - shell-only
      - private
    size: 4
    scaling:
      min: 2
      max: 8
      queueThreshold: 3
      cooldownSeconds: 120
    architecture: auto
    runnerRoot: ${SYNOLOGY_RUNNER_BASE_DIR}/pools/synology-private
    resources:
      memory: 2g
  - key: synology-public
    visibility: public
    organization: omt-global
    runnerGroup: synology-public
    repositoryAccess: selected
    allowedRepositories:
      - omt-global/axiom
      - omt-global/github-runner-fleet
    labels:
      - synology
      - shell-only
      - public
    size: 4
    scaling:
      min: 1
      max: 4
      queueThreshold: 3
      cooldownSeconds: 120
    architecture: auto
    runnerRoot: ${SYNOLOGY_RUNNER_BASE_DIR}/pools/synology-public
    resources:
      memory: 1g
