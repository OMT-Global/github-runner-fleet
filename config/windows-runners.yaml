version: 1
plane: windows-docker
pools:
  - name: windows-private
    group: windows-private
    repositoryAccess: selected
    repositories:
      - example/windows-app
    slots: 2
    host: ${WINDOWS_DOCKER_HOST:-windows-host.internal}
    sshUser: ${WINDOWS_DOCKER_USERNAME:-administrator}
    sshPort: ${WINDOWS_DOCKER_PORT:-22}
    image: ghcr.io/example/github-runner-fleet:0.1.9-windows
    runnerRoot: ${WINDOWS_DOCKER_RUNNER_BASE_DIR}/pools/windows-private
    labels:
      - x64
    resources:
      memory: 8g
