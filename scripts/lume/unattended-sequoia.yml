# Repo-owned fork of Lume's built-in Tahoe preset.
# Keep this in sync with upstream except where Apple changes Setup Assistant
# labels and the built-in preset lags behind.
boot_wait: 30

boot_commands:
  - "<delay 5>"
  - "<space>"
  - "<delay 2>"

  - "<wait 'English', timeout=120>"
  - "<delay 1>"
  - "<type 'English'>"
  - "<delay 1>"
  - "<click 'English'>"
  - "<delay 1>"
  - "<enter>"
  - "<delay 2>"

  - "<wait 'Country or Region'>"
  - "<delay 1>"
  - "<click_at 960,900>"
  - "<delay 1>"
  - "<type 'United States'>"
  - "<delay 1>"
  - "<enter>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  - "<wait 'Transfer Your Data'>"
  - "<delay 30>"
  - "<click 'Set up as new'>"
  - "<delay 2>"
  - "<click 'Continue'>"
  - "<delay 2>"

  - "<wait 'Written and Spoken Languages'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  - "<wait 'Accessibility'>"
  - "<delay 1>"
  - "<click 'Not Now'>"
  - "<delay 2>"

  - "<wait 'Data & Privacy'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  - "<wait 'Create a Mac Account'>"
  - "<delay 10>"
  - "<click 'Full Name'>"
  - "<delay 1>"
  - "<type 'lume'>"
  - "<delay 1>"
  - "<tab>"
  - "<delay 1>"
  - "<tab>"
  - "<delay 1>"
  - "<type 'lume'>"
  - "<delay 1>"
  - "<tab>"
  - "<delay 1>"
  - "<type 'lume'>"
  - "<delay 1>"
  - "<tab>"
  - "<delay 1>"
  - "<tab>"
  - "<delay 1>"
  - "<space>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  # Current Tahoe flow hides the skip path behind "Other Sign-In Options"
