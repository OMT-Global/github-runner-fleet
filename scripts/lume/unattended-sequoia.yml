  - "<click 'Continue'>"
  - "<delay 2>"

  - "<wait 'Update Mac Automatically'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  - "<wait 'welcome'>"
  - "<delay 1>"
  - "<click 'Get Started'>"
  - "<delay 5>"

  - "<delay 30>"
  - "<click_at 960,540>"
  - "<delay 1>"

  - "<cmd+space>"
  - "<delay 5>"
  - "<type 'Termina', delay=350>"
  - "<delay 5>"
  - "<enter>"
  - "<delay 5>"
  - "<type 'defaults write NSGlobalDomain AppleKeyboardUIMode -int 3', delay=350>"
  - "<enter>"
  - "<delay 3>"
  - "<cmd+q>"
  - "<delay 4>"

  - "<click_at 960,540>"
  - "<delay 1>"

  - "<cmd+space>"
  - "<delay 2>"
  - "<type 'System Settings'>"
  - "<delay 2>"
  - "<enter>"
  - "<delay 5>"
  - "<wait 'General', timeout=30>"
  - "<delay 2>"
  - "<cmd+f>"
  - "<delay 1>"
  - "<type 'login'>"
  - "<delay 2>"
