  - "<wait 'Age Range'>"
  - "<delay 1>"
  - "<click 'Adult'>"
  - "<delay 2>"

  - "<wait 'Enable Location Services'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 1>"
  - '<wait "Don''t Use">'
  - "<delay 1>"
  - "<enter>"
  - "<delay 2>"

  - "<wait 'Select Your Time Zone'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  - "<wait 'Analytics'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  - "<wait 'Screen Time'>"
  - "<delay 1>"
  - "<click 'Set Up Later'>"
  - "<delay 2>"

  - "<wait 'Siri', timeout=300>"
  - "<delay 2>"
  - "<click 'Enable Ask Siri'>"
  - "<delay 2>"
  - "<click 'Continue'>"
  - "<delay 2>"

  - "<wait 'FileVault'>"
  - "<delay 1>"
  - "<click 'Not Now'>"
  - "<delay 1>"
  - "<wait 'Securely Encrypted'>"
  - "<delay 1>"
  - "<click 'Continue'>"
  - "<delay 2>"

  - "<wait 'Choose Your Look'>"
